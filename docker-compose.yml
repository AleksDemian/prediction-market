services:
  indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_PATH: /data/app.db
      MARKET_ADDRESS: ${MARKET_ADDRESS}
      RPC_URL: ${RPC_URL}
      CONTRACT_DEPLOY_BLOCK: ${CONTRACT_DEPLOY_BLOCK:-10696829}
      INDEXER_POLL_INTERVAL_MS: ${INDEXER_POLL_INTERVAL_MS:-60000}
      INDEXER_REORG_BUFFER_BLOCKS: ${INDEXER_REORG_BUFFER_BLOCKS:-24}
      INDEXER_REFRESH_PORT: ${INDEXER_REFRESH_PORT:-8787}
    volumes:
      - app-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MARKET_ADDRESS: ${MARKET_ADDRESS}
        NEXT_PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
        NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-11155111}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_RPC_URL: ${RPC_URL}
    depends_on:
      - indexer
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /data/app.db
      INDEXER_REFRESH_URL: http://indexer:${INDEXER_REFRESH_PORT:-8787}/refresh
      NEXT_PUBLIC_MARKET_ADDRESS: ${MARKET_ADDRESS}
      NEXT_PUBLIC_USDC_ADDRESS: ${USDC_ADDRESS}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID:-11155111}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_RPC_URL: ${RPC_URL}
    volumes:
      - app-data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
