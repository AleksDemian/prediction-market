services:
  indexer:
    image: ghcr.io/boostylabs/prediction-market-demo-indexer:latest
    container_name: prediction-market-demo-indexer
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/app.db
      MARKET_ADDRESS: ${MARKET_ADDRESS}
      RPC_URL: ${RPC_URL}
      CONTRACT_DEPLOY_BLOCK: ${CONTRACT_DEPLOY_BLOCK:-10696829}
      INDEXER_POLL_INTERVAL_MS: ${INDEXER_POLL_INTERVAL_MS:-60000}
      INDEXER_REORG_BUFFER_BLOCKS: ${INDEXER_REORG_BUFFER_BLOCKS:-24}
      INDEXER_REFRESH_PORT: ${INDEXER_REFRESH_PORT:-8787}
    volumes:
      - app-data:/data

  frontend:
    image: ghcr.io/boostylabs/prediction-market-demo-frontend:latest
    container_name: prediction-market-demo-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_PATH: /data/app.db
      INDEXER_REFRESH_URL: http://indexer:${INDEXER_REFRESH_PORT:-8787}/refresh
      PRIVATE_KEY: ${PRIVATE_KEY}
      DEMO_ADMIN_PRIVATE_KEY: ${DEMO_ADMIN_PRIVATE_KEY}
    volumes:
      - app-data:/data:ro
    depends_on:
      - indexer
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
